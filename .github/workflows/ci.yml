name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub 
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Spring App Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot

    - name: Build Angular App Image
      run: dokcer build ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

    - name: Push Spring App Image
      run: docker push ${{ secrets.DOKCERHUB_USERNAME }}/spring-app:latest

    - name: Push Angular App Image
      run: dokcer push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest      

    - name: Run application with Docker Compose
      run: 
        docker-compose up -d
        sleep 20
        docker-compose ps
